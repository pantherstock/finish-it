# Auto-fixer — pipeline.json stage `auto-fix`.
# An agent-found issue becomes a fix PR opened by Claude in CI. Human reviews + merges;
# Cloudflare redeploys. Two gotchas that each cost a run are guarded below: OIDC
# (`id-token: write`) and the agent-mode Bash allowlist (else green-but-does-nothing).

name: Auto-fixer

on:
  issues:
    # `labeled` fires whenever ANY label is added to ANY issue. We narrow to our
    # own label in the job's `if:` below — that guard is the cost guardrail.
    types: [labeled]

# The action needs write access to push a branch, open a PR, and comment back.
permissions:
  contents: write        # create the fix branch + commits
  pull-requests: write   # open the PR
  issues: write          # comment on / link the issue
  id-token: write        # OIDC token the action uses to authenticate

jobs:
  fix:
    # Only run for issues carrying the tester's label. Without this, every label
    # on every issue would spin up a (billed) Claude run.
    if: github.event.label.name == 'agent-found'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          # ── AUTH: Claude Pro/Max subscription (no API credits) ──────────────
          # Generate the token locally with:  claude setup-token
          # then add it as a repo secret named CLAUDE_CODE_OAUTH_TOKEN
          # (Settings → Secrets and variables → Actions → New repository secret).
          # This draws on your Pro usage limits — the same quota as interactive
          # Claude Code — instead of metered API billing.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: '*'
          #
          # ── ALTERNATIVE: metered API billing (isolated cost + spend cap) ────
          # Comment out the line above and uncomment the line below, then add an
          # ANTHROPIC_API_KEY secret instead. Use this if you'd rather not spend
          # your Pro quota and want a hard spend cap in the Anthropic Console.
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # The task. GitHub injects the issue's title/body/number at run time.
          prompt: |
            Fix this issue in the Finish It app (a single static file: index.html),
            then open a PR. Stop there — fix-loop.yml handles retries if CI fails.

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            ## Instructions — follow this order exactly to stay within the turn budget

            The issue body above contains everything you need: exact line numbers,
            before/after code snippets, and gotchas. The research brief is already
            quoted inline — do NOT read it separately.

            1. **Read only the specific lines you need.** Use Grep or Read with
               offset+limit targeting the line numbers in Implementation notes.
               Never read index.html in full.

            2. **Write the acceptance test verbatim.** The issue body has an
               "## Acceptance test (Playwright)" section with a target filename and a
               fenced code block. Write that file to the given path under tests/ EXACTLY
               as written — do not edit, weaken, or "improve" the test. It is the
               objective gate for this fix; your job is to make index.html satisfy it.

            3. **Make ALL edits before touching git.** Complete every Edit call
               first. Do not git-diff, git-status, or re-read the file between edits.

            4. **Batch branch + commit + push into one shell call** (stage the fix AND
               the test so the gate runs it):
               git checkout -b fix/issue-${{ github.event.issue.number }} && \
               git add index.html tests/ && \
               git commit -m "fix: ${{ github.event.issue.title }}" && \
               git push -u origin fix/issue-${{ github.event.issue.number }}

            5. **Open the PR** with gh pr create. List each acceptance-check item
               in the body and end with "Closes #${{ github.event.issue.number }}".

            6. **Stop immediately.** Do not verify CI, check PR state, or re-read anything.

            If the issue is unclear or contradictory, or has no "## Acceptance test"
            block, post one comment explaining why, then stop without making any edits.

          # 25 turns covers: targeted reads (≤3) + writing the acceptance test verbatim
          # + edits (up to ~10 for complex issues) + one batched git call + gh pr create.
          # fix-loop.yml handles CI retries.
          claude_args: |
            --model sonnet
            --max-turns 25
            --allowedTools "Edit,Read,Write,Glob,Grep,Bash(git:*),Bash(gh:*)"
