# Phase 3 — Auto-fixer
# An issue labeled `agent-found` (filed by the /qa-tester tester) becomes a PR
# with a fix, opened by Claude running here in CI. You review + merge; Cloudflare
# redeploys. See plan/automation-learning-plan.md.

name: Auto-fixer

on:
  issues:
    # `labeled` fires whenever ANY label is added to ANY issue. We narrow to our
    # own label in the job's `if:` below — that guard is the cost guardrail.
    types: [labeled]

# The action needs write access to push a branch, open a PR, and comment back.
permissions:
  contents: write        # create the fix branch + commits
  pull-requests: write   # open the PR
  issues: write          # comment on / link the issue
  id-token: write        # OIDC token the action uses to authenticate

jobs:
  fix:
    # Only run for issues carrying the tester's label. Without this, every label
    # on every issue would spin up a (billed) Claude run.
    if: github.event.label.name == 'agent-found'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          # ── AUTH: Claude Pro/Max subscription (no API credits) ──────────────
          # Generate the token locally with:  claude setup-token
          # then add it as a repo secret named CLAUDE_CODE_OAUTH_TOKEN
          # (Settings → Secrets and variables → Actions → New repository secret).
          # This draws on your Pro usage limits — the same quota as interactive
          # Claude Code — instead of metered API billing.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          #
          # ── ALTERNATIVE: metered API billing (isolated cost + spend cap) ────
          # Comment out the line above and uncomment the line below, then add an
          # ANTHROPIC_API_KEY secret instead. Use this if you'd rather not spend
          # your Pro quota and want a hard spend cap in the Anthropic Console.
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # The task. GitHub injects the issue's title/body/number at run time.
          prompt: |
            Fix this issue in the Finish It app (a single static file: index.html),
            then loop until the quality gate is green — up to 3 fix attempts total.

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            ## Part 1 — Implement the fix

            - Before writing any code, check if the issue body references a research
              brief (e.g. "docs/research/<capability>.md"). If it does, read that file
              first — it contains best practices, API guidance, and gotchas that must
              inform your implementation.
            - Implement exactly what the issue's "Acceptance check" items describe.
              Treat the "Implementation notes" section as binding constraints, not
              suggestions.
            - Make the smallest change to index.html that satisfies the acceptance
              check. Do not refactor unrelated code or add unrequested features.
            - Do NOT touch the plan/ folder, fable-5/, or any file outside the
              issue's stated scope.
            - Open a pull request. In the PR body, list which acceptance check items
              pass and end with "Closes #${{ github.event.issue.number }}" so merging
              closes the issue.
            - If the issue is unclear or contradictory, comment on the issue
              explaining the ambiguity instead of opening a PR. Stop here.

            ## Part 2 — Wait for checks and fix if failing (max 3 attempts)

            After the PR is open, run this loop (cap at 3 iterations total):

            1. Wait for all checks to complete:
               gh pr checks <PR_NUMBER> --watch --timeout 300
               (Exit code 0 = all green. Non-zero = one or more failed.)

            2. If all green: stop. The notify job will ping Discord automatically.

            3. If any check failed, read the failing log:
               gh run list --branch <branch-name> --limit 5 --json databaseId,name,conclusion
               gh run view <failing-run-id> --log-failed

            4. Diagnose the failure from the log. Fix index.html — smallest possible
               change that addresses what the log reports. Then push:
               git add index.html
               git commit -m "fix: address <check-name> failure (attempt N)"
               git push

            5. Go back to step 1.

            After 3 failed attempts, comment on the PR:
            "Automated fix loop exhausted 3 attempts. Failing check: <name>. Last error: <summary>. Needs human review."
            Then stop.

          # --max-turns raised to 40 to cover: initial fix + PR open + up to 3
          # check-wait/diagnose/fix cycles. Each cycle is ~5–8 turns.
          # --allowedTools: gh run:* and gh pr checks:* added for the check loop.
          claude_args: |
            --model sonnet
            --max-turns 40
            --allowedTools "Edit,Read,Write,Glob,Grep,Bash(git:*),Bash(gh:*)"
