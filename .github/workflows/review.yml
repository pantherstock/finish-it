# Chunk 5 — Adversarial Reviewer
# Runs on every PR that touches index.html. Reads the research brief referenced
# in the linked issue and critiques the implementation against it.
# Advisory only — it posts a comment but does not block merge.

name: Adversarial Reviewer

on:
  pull_request:
    paths:
      - index.html

permissions:
  contents: read
  pull-requests: write
  issues: read
  id-token: write

jobs:
  review:
    name: Review against research brief
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          prompt: |
            You are an adversarial code reviewer for the Finish It app
            (a single static index.html — no framework, no build step).

            PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}

            ## Your job
            Find what is MISSING or WRONG. Look hard before concluding anything is fine.

            ## Steps

            1. Read the PR diff:
               gh pr diff ${{ github.event.pull_request.number }}

            2. Find the issue this PR closes. Search the PR body for "Closes #N" or
               "Fixes #N", then read that issue:
               gh issue view <N>

            3. If the issue body references a research brief (e.g. docs/research/<cap>.md),
               read it now. Also run: glob docs/research/*.md — read any that are relevant
               to the changes in this PR.

            4. Read the changed portions of index.html with Read or Grep as needed.

            5. Critique the implementation against these questions — be specific:
               a. Does it satisfy EVERY acceptance check item in the issue? Check each one.
               b. Does it follow the best practices listed in the research brief?
               c. Does it avoid the anti-patterns listed under "What to avoid"?
               d. Could any part of it silently fail, throw inside an error handler,
                  or corrupt the user's `finishit` localStorage data?
               e. Are there edge cases the implementation misses (e.g. runaway errors,
                  quota exhaustion, malformed stored data)?
               f. Is the change surgical — no unrelated code touched, no unrequested features?

            6. Post your findings as a single PR comment:
               gh pr comment ${{ github.event.pull_request.number }} --body "<your review>"

               Format the comment as:
               ## Adversarial Review
               **Against:** docs/research/<cap>.md (or "no research brief found")

               ### Acceptance check
               - [x] or [ ] each item from the issue, with a note if failing

               ### Best-practice gaps
               Bullet list — quote the brief when calling something out.
               If none, say "None found."

               ### Risk / edge cases
               Bullet list of anything that could silently fail or corrupt data.
               If none, say "None found."

               ### Verdict
               One sentence: does this PR meet the bar set by the issue and brief?

            This review is advisory. Do not use the GitHub review API (approve /
            request-changes) — a comment is sufficient.

          claude_args: |
            --model sonnet
            --max-turns 10
            --allowedTools "Read,Glob,Grep,Bash(gh pr:*),Bash(gh issue:*)"
